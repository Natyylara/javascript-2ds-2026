<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .item {
            background-color: #24B657;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }

    </style>

    <title>Aula05 - GRID CSS responsivo</title>

</head>
    <body>
        
        <div class="grid">

            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
            
        </div>

    </body>
</html>
