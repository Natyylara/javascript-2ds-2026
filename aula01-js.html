<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula01 - javascript</title>
</head>
    <body>

        <input type="text" id="teste">
        <button onclick="enviar()">Enviar</button>
        <div id="resultado"></div>


    </body>





        <script>

            let nome = "Tamsy";
            let idade = 23;
            let altura = 1.80;
            let trabalhando = true;

            document.write("<h1>" + nome + "</h1>");
            document.write("<br>");
            document.write(idade);
            document.write("<br>"); 
            document.write(altura);
            document.write("<br>");
            document.write(trabalhando);

            let teste = document.getElementById("teste");
            let areaTexto = document.getElementById("resultado");

            function enviar() {
                let mensagem = testee.value;
                //PEGAMOS O .value PARA VER O TEXTO
                alert("Você digitou: " + mensagem);
                areaTexto.innerHTML = "<h3>Você digitou: " + mensagem + "</h3>";
            }




        </script>














</html>
